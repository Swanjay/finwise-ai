<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- "Fin" in bold gradient -->
  <text x="50" y="140" font-family="Inter, system-ui, sans-serif" font-size="120" font-weight="800" fill="url(#textGrad)" filter="url(#glow)">
    Fin
  </text>
  
  <!-- "Wise" in light weight -->
  <text x="260" y="140" font-family="Inter, system-ui, sans-serif" font-size="120" font-weight="400" fill="white" opacity="0.9">
    Wise
  </text>
  
  <!-- Small AI badge -->
  <rect x="490" y="60" width="60" height="28" rx="14" fill="url(#textGrad)" opacity="0.8"/>
  <text x="520" y="81" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white">
    AI
  </text>
  
  <!-- Tagline -->
  <text x="50" y="175" font-family="Inter, system-ui, sans-serif" font-size="16" fill="white" opacity="0.5" letter-spacing="4">
    CATAT KEUANGAN LEBIH PINTAR
  </text>
</svg>
