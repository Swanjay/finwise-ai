<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="800" height="250">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Icon (smaller, left side) -->
  <g transform="translate(20, 25) scale(0.8)">
    <!-- Icon background -->
    <rect width="200" height="200" rx="40" fill="url(#iconGrad)" filter="url(#shadow)"/>
    
    <!-- Wallet -->
    <g transform="translate(35, 40)">
      <rect x="0" y="25" width="130" height="100" rx="14" fill="white" opacity="0.95"/>
      <path d="M 0 50 L 0 25 C 0 11 11 0 25 0 L 105 0 C 119 0 130 11 130 25 L 130 50 C 100 65 75 70 65 70 C 55 70 30 65 0 50 Z" fill="white"/>
      <rect x="15" y="30" width="60" height="20" rx="5" fill="url(#iconGrad)" opacity="0.3"/>
      <circle cx="100" cy="85" r="18" fill="url(#iconGrad)" opacity="0.2"/>
      <circle cx="100" cy="85" r="12" fill="none" stroke="white" stroke-width="2" opacity="0.7"/>
    </g>
    
    <!-- Growth arrow -->
    <g transform="translate(120, 20)">
      <path d="M 0 60 C 15 50 30 30 50 10" stroke="#10b981" stroke-width="6" stroke-linecap="round" fill="none"/>
      <polygon points="50,10 42,25 58,25" fill="#10b981"/>
      <circle cx="55" cy="8" r="3" fill="#fbbf24"/>
      <circle cx="62" cy="18" r="2" fill="#fbbf24" opacity="0.7"/>
    </g>
  </g>
  
  <!-- Text (right side) -->
  <g transform="translate(200, 80)">
    <!-- "Fin" bold gradient -->
    <text x="0" y="80" font-family="Inter, system-ui, sans-serif" font-size="90" font-weight="800" fill="url(#textGrad)" filter="url(#glow)">
      Fin
    </text>
    
    <!-- "Wise" light -->
    <text x="170" y="80" font-family="Inter, system-ui, sans-serif" font-size="90" font-weight="400" fill="white" opacity="0.9">
      Wise
    </text>
    
    <!-- AI badge -->
    <rect x="370" y="20" width="50" height="24" rx="12" fill="url(#iconGrad)" opacity="0.8"/>
    <text x="395" y="38" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="white">
      AI
    </text>
  </g>
  
  <!-- Tagline -->
  <text x="210" y="200" font-family="Inter, system-ui, sans-serif" font-size="14" fill="white" opacity="0.4" letter-spacing="3">
    CATAT KEUANGAN LEBIH PINTAR
  </text>
</svg>
