<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle glow -->
  <circle cx="256" cy="256" r="200" fill="url(#grad1)" opacity="0.1" filter="url(#glow)"/>
  
  <!-- Main circle -->
  <circle cx="256" cy="256" r="180" fill="url(#grad1)"/>
  
  <!-- Wallet icon (simplified) -->
  <g transform="translate(120, 150)">
    <!-- Wallet body -->
    <rect x="0" y="30" width="272" height="180" rx="24" fill="white" opacity="0.95"/>
    
    <!-- Wallet flap -->
    <path d="M 0 70 L 0 30 C 0 14 14 0 30 0 L 242 0 C 258 0 272 14 272 30 L 272 70 C 220 95 160 105 136 105 C 112 105 52 95 0 70 Z" 
          fill="white"/>
    
    <!-- Card visible -->
    <rect x="20" y="45" width="120" height="35" rx="8" fill="url(#grad2)" opacity="0.4"/>
    <rect x="25" y="50" width="40" height="8" rx="2" fill="white" opacity="0.6"/>
    <rect x="25" y="62" width="80" height="6" rx="2" fill="white" opacity="0.4"/>
    
    <!-- Coin -->
    <circle cx="220" cy="150" r="35" fill="url(#grad2)" opacity="0.3"/>
    <circle cx="220" cy="150" r="25" fill="none" stroke="white" stroke-width="3" opacity="0.8"/>
    <text x="220" y="158" text-anchor="middle" fill="white" font-size="20" font-weight="bold" opacity="0.9">$</text>
  </g>
  
  <!-- Growth elements -->
  <g transform="translate(300, 80)">
    <!-- Rising arrow -->
    <path d="M 0 120 C 30 100 60 60 90 20" stroke="#10b981" stroke-width="10" stroke-linecap="round" fill="none"/>
    <polygon points="90,20 75,50 105,50" fill="#10b981"/>
    
    <!-- Sparkles -->
    <g fill="#fbbf24">
      <circle cx="95" cy="15" r="5"/>
      <circle cx="110" cy="35" r="3"/>
      <circle cx="80" cy="10" r="2.5"/>
      <circle cx="105" cy="5" r="2"/>
    </g>
  </g>
  
  <!-- Small "+" signs for growth -->
  <g fill="white" opacity="0.6">
    <text x="380" y="180" font-size="24">+</text>
    <text x="360" y="200" font-size="16">+</text>
  </g>
</svg>
